  {id:"T2Q71",q:"Following an annual review, a company\'s land assets have declined in value. How is this reflected in the Statement of Financial Position?",opts:["Amortisation is increased","Depreciation is increased","Depreciation is decreased","Revaluation reserve is decreased"],ans:3,exp:"Land that is carried at a revalued amount and has declined in value will result in a reduction of the revaluation reserve (in equity). Land is not depreciated (it has an indefinite useful life) and amortisation applies to intangibles, not land."},
  {id:"T2Q72",q:"Turnover less the cost of sales, distribution and administration gives which income statement figure?",opts:["Profit before tax","Distributable profit","Total gross income","Operating profit"],ans:3,exp:"Operating profit (or EBIT) = Revenue − Cost of Sales − Distribution Costs − Administrative Expenses. This is the profit from ongoing trading operations before interest and tax."},
  {id:"T2Q73",q:"Which of the following items would usually appear in an income statement?",opts:["Creditors","Fixed assets","Net cash","Turnover"],ans:3,exp:"The income statement (profit and loss account) shows revenues and expenses over a period — turnover (revenue) is the starting line. Creditors and fixed assets appear on the balance sheet; net cash appears in the cash flow statement."},
  {id:"T2Q74",q:"Which of the following is a required heading in a cash flow statement?",opts:["Bank account summary","Taxation liabilities","Investing activities","Loan and debt statement"],ans:2,exp:"IAS 7 requires a cash flow statement to present cash flows under three headings: Operating activities, Investing activities, and Financing activities. \'Investing activities\' is the only one of the four options that matches a required heading."},
  {id:"T2Q75",q:"Within a cash flow statement, dividends received should appear under which heading?",opts:["Income collection","Inflow cash","Investing activity","Cash generation profit"],ans:2,exp:"Under IAS 7, dividends received may be classified under either operating or investing activities. The standard treatment for most entities is to include dividends received as investing activities (returns on investments)."},
  {id:"T2Q76",q:"What type of cash flow is the \'free cash flow to shareholders\' known as?",opts:["Equity","Dividend","Investment","Repayment"],ans:0,exp:"Free Cash Flow to Equity (FCFE) is the cash available to equity shareholders after meeting all financial obligations. It is known as the equity cash flow — the amount that could be paid as dividends or used for share buybacks."},
  {id:"T2Q77",q:"As an alternative to using the cash flow statement to calculate free cash flow, which of the following is often used?",opts:["Statement of Financial Position","Debtors ledger and bank account balances","Income statement","Expenditure calculations"],ans:2,exp:"Free cash flow can be derived from the income statement by adjusting operating profit for non-cash items (depreciation, amortisation) and changes in working capital — this gives an approximation without requiring the full cash flow statement."},
  {id:"T2Q78",q:"ABC Plc has announced profits attributable to ordinary shareholders of £2,000,000. ABC Plc has 10 million ordinary shares with a nominal value of 50p and a market price of £2.00. What are the earnings per share?",opts:["2½p","5p","10p","20p"],ans:3,exp:"EPS = Profit ÷ Number of shares = £2,000,000 ÷ 10,000,000 = £0.20 = 20p. The nominal value and market price are irrelevant to EPS calculation."},
  {id:"T2Q79",q:"Which of the following is a risk of selling a bond prior to its maturity date?",opts:["The final payment will be reduced","A coupon payment may be missed","The market value could be above the nominal value","The market value could be below the nominal value"],ans:3,exp:"If interest rates have risen since a bond was purchased, its market price will have fallen below par (nominal value). Selling before maturity would realise a capital loss. This is the key price risk of selling early."},
  {id:"T2Q80",q:"Life insurance companies generally invest for their long-term obligations in which asset class?",opts:["Equities","Fixed income","Derivatives","Futures"],ans:0,exp:"Life insurers match long-term liabilities (life and annuity policies) with long-term assets. Equities provide the long-term capital growth needed to meet these obligations, and are the largest asset class in life insurance portfolios."},
  {id:"T2Q81",q:"Which of the following is MOST likely to establish a fund that maintains a short-term liability profile allowing very little risk and low returns?",opts:["Trustees of pension funds","Life assurance companies","Managers of collective investment schemes","General insurance companies"],ans:3,exp:"General insurance companies (home, motor, liability insurance) have short-term liabilities — claims must be paid quickly. They therefore hold predominantly short-term, low-risk liquid assets. Pension funds and life insurers have long-term liabilities."},
  {id:"T2Q82",q:"An analysis of ABC Ltd shows its trading activities have increased by around 10% over the last 12 months. Which financial statement MOST likely provided this information?",opts:["Statement of Financial Position","Income Statement","Statement of Changes in Equity","Cash Flow Statement"],ans:1,exp:"Trading activities (i.e. revenue/turnover) are reported in the Income Statement (profit and loss account). A 10% increase in turnover would be visible by comparing income statements for the two periods."},
  {id:"T2Q83",q:"If a Eurobond is described as immobilised, this means that it:",opts:["Cannot be sold","Has to be retained in its original currency","Is held in a depositary","Must remain in just one territory"],ans:2,exp:"Immobilisation of Eurobonds means the physical certificates are deposited with a central securities depository (such as Euroclear or Clearstream) and all subsequent transfers are made by book entry — the bonds never physically move."},
  {id:"T2Q84",q:"What happens as a result of utilising the \'greenshoe option\' under an initial public offering?",opts:["Shares are purchased at a significant discount","More shares are issued than originally planned","Shares are issued without voting rights","Only those who bid beyond a certain price are granted shares"],ans:1,exp:"The greenshoe (over-allotment) option allows the underwriter to issue up to 15% more shares than originally planned if demand is high. This supports the share price post-IPO and provides additional capital for the company."},
  {id:"T2Q85",q:"Why would an investor who wants capital growth invest in all major asset classes?",opts:["The classes tend to operate on a strong positive correlation basis","Each class has different risk/reward characteristics","The classes are all linked to a common index","Each class can accommodate a full range of investment terms"],ans:1,exp:"Different asset classes (equities, bonds, property, alternatives) have different risk/return profiles and low or negative correlations with each other. Diversifying across them reduces overall portfolio risk while maintaining return potential."},
  {id:"T2Q86",q:"Why might a company decide to launch a scrip issue?",opts:["To launch a takeover bid","To raise extra capital","To obtain a stock market listing","To reduce the share price"],ans:3,exp:"A scrip (bonus) issue increases the number of shares in issue proportionately, reducing the share price accordingly. Companies do this when the share price has risen so high it may deter smaller investors or impair marketability."},
  {id:"T2Q87",q:"Where a trade involves shares which are \'dematerialised\', this means that:",opts:["The shareholders\' register will be unaffected","The settlement period will be less than the standard duration","The transaction will be settled electronically","The need for a central counterparty will be avoided"],ans:2,exp:"Dematerialisation means securities exist only as electronic records — there are no physical certificates. Settlement occurs through electronic book-entry transfer, updating the register electronically. The register is still updated; CCPs may still be used."},
  {id:"T2Q88",q:"When listing new shares, why might a company choose to appoint an underwriter?",opts:["To ensure the shares are widely marketed","To prevent the shares being sold on too quickly","To ensure that all the shares are sold","To prevent a fall in the share price"],ans:2,exp:"An underwriter guarantees to purchase any shares not taken up by investors, ensuring the issuer receives the full amount of capital sought regardless of market conditions. This eliminates the risk of a partially subscribed issue."},
  {id:"T2Q89",q:"Securities firm X is responding to recent market movements through high-frequency trading, rather than placing conventional orders like firm Y. Compared to firm Y, firm X is looking to benefit by dealing:",opts:["More quickly","A large quantity of stock in a single order","At lower costs","Across wider markets"],ans:0,exp:"High-frequency trading (HFT) uses algorithms and co-location to execute orders in microseconds — far faster than human traders or conventional order systems. Speed is the core advantage, enabling the firm to react to price movements before competitors."},
  {id:"T2Q90",q:"Company X is listed on an overseas stock exchange and is seeking an introduction to become listed on the LSE. If successful, Company X is MOST likely to benefit from:",opts:["Immediate access to the primary market of the LSE","Extra liquidity in its shares","Capital raised through the additional share issue","Increased flexibility available under the greenshoe option"],ans:1,exp:"An introduction to the LSE does not raise new capital — no new shares are issued. The key benefit is increased liquidity, as the company\'s shares become accessible to a wider pool of UK investors on a major exchange."},
  {id:"T2Q91",q:"Which of the following characteristics is most often associated with the secondary market?",opts:["The market where companies make their initial public offering","The market where companies can make offers for subscriptions","The market where listed securities are freely transacted","The market where companies are able to raise capital"],ans:2,exp:"The secondary market is where existing securities are bought and sold between investors — companies do not receive any proceeds. The primary market is where new securities are issued and capital is raised."},
  {id:"T2Q92",q:"A company sells its shares to an investment bank, which subsequently sells those shares to investors at a premium to the price they paid. This is known as:",opts:["An invitation to subscribe","An offer for sale","A Dutch auction","A premium listing"],ans:1,exp:"An offer for sale is where an issuing company sells shares to an investment bank (intermediary), which then sells them on to the public at a higher price, retaining the spread. The company receives the proceeds from the initial bank sale."},
  {id:"T2Q93",q:"A key benefit of an investor purchasing residential properties for investment purposes is:",opts:["That 40% of the income received will usually be tax free","Long-term rental contracts of 10 years or more guarantee a steady income stream","The tenant will be responsible for any repairs and maintenance","A wide range of property types are available, which can lead to a diversified portfolio"],ans:3,exp:"Direct residential property investment offers diversification through a wide range of locations, property types, and tenant profiles. Rental income is generally fully taxable; long leases are commercial not residential; landlords bear maintenance costs."},
  {id:"T2Q94",q:"What is a key benefit of purchasing shares in an investment trust compared to a comparable unit trust?",opts:["Lower stamp duty reserve tax costs","Improved liquidity and tradability","Potential to invest at a discount to net asset value","Clarity of a single price to buy and sell"],ans:2,exp:"Investment trusts are closed-ended listed companies whose shares can trade at a discount or premium to NAV. Buying at a discount means acquiring assets for less than their value — a key potential benefit over open-ended unit trusts which always trade at NAV."},
  {id:"T2Q95",q:"If the GBP/USD spot rate is 1.4200 and the annual interest rate is 2.2% in the US and 3.1% in the UK, what would be the one year forward rate?",opts:["1.4076","1.4152","1.4325","1.4512"],ans:0,exp:"Using Interest Rate Parity: Forward = Spot × (1 + US rate) / (1 + UK rate) = 1.4200 × (1.022) / (1.031) = 1.4200 × 0.99127 = 1.4076. The USD appreciates (GBP depreciates) as UK rates are higher."},
  {id:"T2Q96",q:"Which of the following risks could increase as a consequence of high frequency trading?",opts:["Credit","Liquidity","Counterparty","Systemic"],ans:3,exp:"HFT can increase systemic risk — the risk of widespread market disruption affecting the entire financial system. Flash crashes (like May 2010) demonstrate how HFT algorithms can amplify price movements and reduce market stability at speed."},
  {id:"T2Q97",q:"What purpose does securities lending generally serve?",opts:["Provides liquidity to the market","Provides introductions to lenders that would otherwise be difficult to make","Serves to lend stock to companies requiring finance","Generates income for companies requiring finance"],ans:0,exp:"Securities lending improves market liquidity by enabling short sellers to borrow stock and fulfil delivery obligations. Without securities lending, short selling would be impractical, reducing liquidity and price discovery in equity markets."},
  {id:"T2Q98",q:"A key issue facing investors who wish to invest in deposits based overseas is that they:",opts:["Will suffer higher levels of taxation","Will usually be offered lower interest rates compared with UK rates","Will always be covered by the FSCS deposit insurance","May be subject to exchange controls when repatriating the money"],ans:3,exp:"Many countries impose exchange controls that restrict the transfer of money across borders. Investors in overseas deposits may find it difficult or impossible to repatriate their capital and interest. Overseas deposits are not covered by the FSCS."},
  {id:"T2Q99",q:"What is the purpose of the law, employed in some jurisdictions, whereby securities lending and borrowing is often mandatory?",opts:["To ensure short sellers pre-borrow the stock to be sold so settlement is timely","To avoid unsettled sales clogging up the settlement process, leading to illiquidity","To provide better audit trails and record keeping for Hedge Funds","To deter short sellers from making gains in falling markets"],ans:0,exp:"Some jurisdictions require short sellers to pre-borrow securities before selling to ensure they can deliver on settlement date. This prevents \'naked\' short selling, which can cause settlement failures and market disruption."},
  {id:"T2Q100",q:"Which of the following is regarded as a purpose of including a stakeholder review within an annual report?",opts:["It can provide information that may be of interest for investors wanting to engage in socially responsible investing","It provides an overview of the strategy that the company has adopted","It allows the CFO to summarise the company performance based on a whole range of different metrics","It outlines how the company runs its business, including commentary from an Independent Non-executive Director"],ans:0,exp:"The stakeholder review section of an annual report covers the company\'s relationships with employees, customers, communities, and environment. This information is particularly relevant to ESG/SRI investors interested in the social and ethical dimensions of investing."}
];

/* ── TIMER ──────────────────────────────────────── */
let timerSecs = 90 * 60;
let timerRunning = false;
let timerInterval = null;

function timerTick(){
  if(timerSecs <= 0){ clearInterval(timerInterval); timerRunning=false; updateTimerDisplay(); return; }
  timerSecs--;
  updateTimerDisplay();
}

function updateTimerDisplay(){
  const m = Math.floor(timerSecs/60);
  const s = timerSecs % 60;
  const el = document.getElementById('timer-display');
  if(!el) return;
  el.textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  el.className = 'timer-display';
  if(timerSecs <= 3*60) el.classList.add('timer-red');
  else if(timerSecs <= 10*60) el.classList.add('timer-yellow');
  else el.classList.add('timer-green');
}

function timerStart(){
  if(timerRunning || timerSecs<=0) return;
  timerRunning = true;
  timerInterval = setInterval(timerTick, 1000);
}

function timerPause(){
  if(!timerRunning) return;
  timerRunning = false;
  clearInterval(timerInterval);
}

function timerStop(){
  timerRunning = false;
  clearInterval(timerInterval);
}

function timerReset(){
  timerRunning = false;
  clearInterval(timerInterval);
  timerSecs = 90 * 60;
  updateTimerDisplay();
}

/* ── STATE ──────────────────────────────────────── */
let order = [];       // shuffled indices into QS
let curr = 0;
let answered = [];    // null | selected-index
let score = 0;
let done = false;
let wrongMode = false;
let wrongBank = new Set(); // QS indices of wrong answers
let wrongOrder = [];
let wrongAnswered = [];
let wrongCurr = 0;
let wrongDone = false;
let activeTestMode = 't1'; // t1 | t2 | all

/* ── PERSISTENCE ─────────────────────────────────────── */
const SAVE_KEY = 'cisi_securities_save_v2';

function saveState(){
  try {
    const state = {
      activeTestMode,
      order,
      curr,
      answered,
      score,
      done,
      wrongBank: [...wrongBank],
      wrongMode,
      wrongOrder,
      wrongAnswered,
      wrongCurr,
      wrongDone,
      timerSecs,
      timerRunning: false // never save as running
    };
    localStorage.setItem(SAVE_KEY, JSON.stringify(state));
    // Show toast
    const toast = document.getElementById('save-toast');
    if(toast){
      toast.classList.add('show');
      clearTimeout(toast._t);
      toast._t = setTimeout(()=>toast.classList.remove('show'), 1500);
    }
  } catch(e){ /* localStorage may be unavailable */ }
}

function loadState(){
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if(!raw) return false;
    const s = JSON.parse(raw);
    activeTestMode  = s.activeTestMode  || 't1';
    order           = s.order           || [];
    curr            = s.curr            || 0;
    answered        = s.answered        || [];
    score           = s.score           || 0;
    done            = s.done            || false;
    wrongBank       = new Set(s.wrongBank || []);
    wrongMode       = s.wrongMode       || false;
    wrongOrder      = s.wrongOrder      || [];
    wrongAnswered   = s.wrongAnswered   || [];
    wrongCurr       = s.wrongCurr       || 0;
    wrongDone       = s.wrongDone       || false;
    timerSecs       = (s.timerSecs !== undefined) ? s.timerSecs : 90*60;
    return true;
  } catch(e){ return false; }
}

function clearSave(){
  try { localStorage.removeItem(SAVE_KEY); } catch(e){}
}

function switchTest(mode){
  activeTestMode = mode;
  wrongBank.clear();
  wrongMode = false;
  wrongAnswered = [];
  wrongOrder = [];
  clearSave();
  document.getElementById('wrong-mode-btn').classList.remove('active-mode');
  document.querySelectorAll('.test-tab').forEach(el=>el.classList.remove('active'));
  const el = document.getElementById('tab-'+mode);
  if(el) el.classList.add('active');
  startOver();
}

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function startOver(){
  const bank = getActiveBank();
  order = shuffle([...Array(bank.length).keys()]);
  curr = 0;
  answered = new Array(bank.length).fill(null);
  score = 0;
  done = false;
  wrongMode = false;
  document.getElementById('wrong-mode-btn').classList.remove('active-mode');
  saveState();
  render();
}

function getActiveBank(){
  if(activeTestMode==='t2') return QS2;
  if(activeTestMode==='all') return [...QS,...QS2];
  return QS; // t1 default
}

function toggleWrongMode(){
  if(wrongBank.size === 0){
    wrongMode = false;
    document.getElementById('wrong-mode-btn').classList.remove('active-mode');
    render();
    return;
  }
  wrongMode = !wrongMode;
  document.getElementById('wrong-mode-btn').classList.toggle('active-mode', wrongMode);
  if(wrongMode) startWrongDrill();
  else render();
}

function startWrongDrill(){
  wrongOrder = shuffle([...wrongBank]);
  wrongAnswered = new Array(wrongOrder.length).fill(null);
  wrongCurr = 0;
  wrongDone = false;
  saveState();
  render();
}

function clearWrongBank(){
  wrongBank.clear();
  wrongMode = false;
  wrongOrder = [];
  wrongAnswered = [];
  wrongCurr = 0;
  wrongDone = false;
  document.getElementById('wrong-mode-btn').classList.remove('active-mode');
  saveState();
  render();
}

/* ── HELPERS ────────────────────────────────────── */
function pct(sc, total){ return total===0 ? 0 : Math.round(sc/total*100); }
function pctCls(p){ return p>=70?'good':p>=50?'mid':'low'; }

function getAnswered(){ return wrongMode ? wrongAnswered : answered; }
function getCurr(){ return wrongMode ? wrongCurr : curr; }
function getOrder(){ return wrongMode ? wrongOrder : order; }
function getTotal(){ return wrongMode ? wrongOrder.length : getActiveBank().length; }
function getDone(){ return wrongMode ? wrongDone : done; }

function getScore(){
  if(wrongMode){
    return wrongAnswered.filter((a,i)=> a!==null && a===QS[wrongOrder[i]].ans).length;
  }
  return score;
}

/* ── RENDER ─────────────────────────────────────── */
function renderWrongBankPanel(){
  if(wrongBank.size === 0 || wrongMode) return '';
  return `<div class="wrong-bank-panel">
    <div class="wbp-hdr">
      <span>&#128293;</span>
      <span class="wbp-title">Wrong Answer Bank</span>
      <span class="wbp-count">${wrongBank.size}</span>
    </div>
    <div class="wbp-note">Questions you answered incorrectly. Drill them until you get them all right.</div>
    <div class="wbp-btns">
      <button class="wbp-drill" onclick="startWrongDrill();wrongMode=true;document.getElementById('wrong-mode-btn').classList.add('active-mode');render()">&#9654; Start Drill (${wrongBank.size} Qs)</button>
      <button class="wbp-clear" onclick="clearWrongBank()">&#128465; Empty Bank</button>
    </div>
  </div>`;
}

function renderTracker(){
  const ans = getAnswered();
  const ord = getOrder();
  const c = getCurr();
  const isDone = getDone();
  return ord.map((qi,i)=>{
    let cls='dot-unseen';
    const a = ans[i];
    if(a!==null){ cls = a===getActiveBank()[qi].ans ? 'dot-correct' : 'dot-wrong'; }
    const active = i===c && !isDone ? ' dot-active' : '';
    return `<div class="tracker-dot ${cls}${active}" title="Q${i+1}" onclick="goTo(${i})"></div>`;
  }).join('');
}

function renderScoreBar(){
  const answeredCount = getAnswered().filter(x=>x!==null).length;
  const sc = getScore();
  const p = pct(sc, answeredCount);
  const total = getTotal();
  return `<div class="score-bar">
    <div class="sc"><span class="n">${sc}</span><span class="d">/ ${answeredCount} ans</span></div>
    <span class="sc-sep">·</span>
    <span class="sc-pct ${pctCls(p)}">${p}%</span>
    <div class="sc-bar-wrap"><div class="sc-bar-fill" style="width:${p}%"></div></div>
    <div class="sc" style="margin-left:auto"><span class="n">${total - answeredCount}</span><span class="d">left</span></div>
  </div>`;
}

function renderQuestion(){
  const c = getCurr();
  const ord = getOrder();
  const ans = getAnswered();
  const total = getTotal();
  const qi = ord[c];
  const q = getActiveBank()[qi];
  const selected = ans[c]; // null or index
  const isAnswered = selected !== null;

  const optsHTML = q.opts.map((o,i)=>{
    let cls = '';
    if(isAnswered){
      if(i === q.ans) cls = 'ok';
      else if(i === selected) cls = 'bad';
      else cls = 'disabled';
    }
    const click = isAnswered ? '' : `onclick="pick(${i})"`;
    return `<div class="opt ${cls}" ${click}>
      <div class="opt-l">${'ABCD'[i]}</div>
      <div class="opt-text">${o}</div>
    </div>`;
  }).join('');

  let expHTML = '';
  if(isAnswered){
    const correct = selected === q.ans;
    const cls = correct ? 'exp-box show exp-ok' : 'exp-box show exp-bad';
    const icon = correct ? '✓ Correct' : '✗ Incorrect';
    expHTML = `<div class="${cls}"><strong>${icon}.</strong> ${q.exp}</div>`;
  }

  const bankName = activeTestMode==='t2'?'Test 2':activeTestMode==='all'?'All Tests':'Test 1';
  const modeLabel = wrongMode
    ? `<div class="round-pill wrong-pill">&#128293; Wrong Bank · Q${c+1} of ${total}</div>`
    : `<div class="round-pill">Q${c+1} of ${total} <span style="opacity:.6;margin-left:4px">· ${bankName}</span></div>`;

  const showNext = isAnswered && c < total - 1;
  const showResult = isAnswered && c === total - 1 && !getDone();

  return `<div class="round-info">
    ${modeLabel}
    <div class="progress-pill">Score <span class="prog-nums">${getScore()}/${getAnswered().filter(x=>x!==null).length}</span> <span style="opacity:.6;font-size:.6rem">${pct(getScore(),getAnswered().filter(x=>x!==null).length)}%</span></div>
  </div>
  <div class="tracker">${renderTracker()}</div>
  ${renderScoreBar()}
  <div class="q-card">
    <div class="q-label">Question ${c+1} · ${q.id}</div>
    <div class="q-text">${q.q}</div>
    <div class="opts">${optsHTML}</div>
    ${expHTML}
  </div>
  <div class="nav-row">
    ${c > 0 ? `<button class="btn btn-sec" onclick="prev()">← Previous</button>` : ''}
    ${showNext ? `<button class="btn btn-p" onclick="next()">Next →</button>` : ''}
    ${showResult ? `<button class="btn btn-p" onclick="finishRound()">See Results →</button>` : ''}
    ${wrongMode ? `<button class="btn btn-sec" onclick="wrongMode=false;document.getElementById('wrong-mode-btn').classList.remove('active-mode');render()">← Back to Main</button>` : ''}
    ${wrongMode ? `<button class="btn" style="background:#ede9fe;color:#5b21b6;border:1.5px solid #c4b5fd;" onclick="clearWrongBank()">&#128465; Empty Bank</button>` : ''}
  </div>`;
}

function renderResult(){
  const sc = getScore();
  const total = getTotal();
  const p = pct(sc, total);
  let grade, gradeStyle;
  if(p>=80){grade='Excellent';gradeStyle='background:#d1fae5;color:#065f46';}
  else if(p>=70){grade='Good Pass';gradeStyle='background:var(--teal-l);color:var(--teal-d)';}
  else if(p>=60){grade='Borderline';gradeStyle='background:var(--amber-l);color:var(--amber)';}
  else{grade='Needs Work';gradeStyle='background:#fee2e2;color:#991b1b';}
  const barCol = p>=70?'#059669':p>=50?'#d97706':'#dc2626';
  const wrong2 = getAnswered().filter((a,i)=>a!==null && a!==getActiveBank()[getOrder()[i]].ans).length;
  const correct2 = getAnswered().filter((a,i)=>a!==null && a===getActiveBank()[getOrder()[i]].ans).length;
  const isWrong = wrongMode;

  return `<div class="result-card">
    <div style="font-size:.72rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.4rem">${isWrong?'Wrong Bank Drill — Result':'Final Result'}</div>
    <div class="result-big" style="color:var(--navy)">${sc} / ${total}</div>
    <div class="result-grade" style="${gradeStyle}">${grade}</div>
    <div class="result-bar-wrap"><div class="result-bar-fill" style="width:${p}%;background:${barCol}"></div></div>
    <div class="result-breakdown">
      <span class="rp" style="background:#d1fae5;color:#065f46">✓ ${correct2} correct</span>
      <span class="rp" style="background:#fee2e2;color:#991b1b">✗ ${wrong2} wrong</span>
      <span class="rp" style="background:var(--gray-l);color:var(--gray-d)">${p}%</span>
    </div>
    <div style="font-size:.78rem;color:var(--text2);margin-bottom:1rem">${isWrong?'Wrong Bank Drill':'Securities & Markets · 50 questions'}</div>
    <div style="display:flex;gap:.5rem;justify-content:center;flex-wrap:wrap">
      ${isWrong ? `<button class="btn btn-wrong" onclick="startWrongDrill();render()">&#8634; Retry Wrong Bank</button>` : ''}
      <button class="btn btn-p" onclick="startOver()">&#8634; New Round (all 50)</button>
      ${!isWrong && wrongBank.size>0 ? `<button class="btn btn-wrong" onclick="wrongMode=true;document.getElementById('wrong-mode-btn').classList.add('active-mode');startWrongDrill();render()">&#128293; Drill ${wrongBank.size} Wrong</button>` : ''}
    </div>
  </div>`;
}

function render(){
  const el = document.getElementById('app-content');
  el.innerHTML = renderWrongBankPanel() + (getDone() ? renderResult() : renderQuestion());
}

/* ── ACTIONS ────────────────────────────────────── */
function pick(i){
  if(wrongMode){
    if(wrongAnswered[wrongCurr] !== null) return;
    const qi = wrongOrder[wrongCurr];
    const q = getActiveBank()[qi];
    wrongAnswered[wrongCurr] = i;
    // if correct in drill, remove from bank
    if(i === q.ans) wrongBank.delete(qi); // qi is index into active bank
    saveState();
    render();
  } else {
    if(answered[curr] !== null) return;
    const qi = order[curr];
    const q = getActiveBank()[qi];
    answered[curr] = i;
    if(i === q.ans){ score++; }
    else { wrongBank.add(qi); }
    saveState();
    render();
  }
}

function next(){
  if(wrongMode){ if(wrongCurr < wrongOrder.length-1){ wrongCurr++; saveState(); render(); } }
  else { if(curr < getActiveBank().length-1){ curr++; saveState(); render(); } }
}

function prev(){
  if(wrongMode){ if(wrongCurr > 0){ wrongCurr--; saveState(); render(); } }
  else { if(curr > 0){ curr--; saveState(); render(); } }
}

function goTo(i){
  if(getDone()) return;
  if(wrongMode) wrongCurr = i;
  else curr = i;
  saveState();
  render();
}

function finishRound(){
  if(wrongMode) wrongDone = true;
  else done = true;
  saveState();
  render();
}

/* ── INIT ───────────────────────────────────────── */
(function(){
  const loaded = loadState();
  if(loaded && order.length > 0){
    // Restore tab UI
    document.querySelectorAll('.test-tab').forEach(el=>el.classList.remove('active'));
    const tabEl = document.getElementById('tab-'+activeTestMode);
    if(tabEl) tabEl.classList.add('active');
    if(wrongMode){
      document.getElementById('wrong-mode-btn').classList.add('active-mode');
    }
  } else {
    startOver();
  }
  updateTimerDisplay();
  render();
})();
</script>
<div class="save-toast" id="save-toast">✓ Progress saved</div>
</body>
</html>
